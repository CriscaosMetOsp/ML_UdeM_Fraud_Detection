name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Code Quality ──────────────────────────────────────────────────────────
  # lint:
  #   name: Lint & Format Check
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4

  #     - name: Set up Python 3.10
  #       uses: actions/setup-python@v4
  #       with:
  #         python-version: "3.10"

  #     - name: Install linting tools
  #       run: pip install black flake8

  #     - name: Check formatting with black
  #       run: black --check src/ tests/

  #     - name: Lint with flake8
  #       run: flake8 src/ tests/ --max-line-length 88 --extend-ignore E203,W503

  # ─── Unit Tests ────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas numpy scikit-learn xgboost mlflow prefect fastapi \
                      pydantic imbalanced-learn joblib pyyaml pytest scipy \
                      optuna optuna-integration[mlflow] evidently prometheus-client

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

  # ─── Build Docker Image ────────────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t fraud-detection-api:${{ github.sha }} .

      - name: Smoke test container
        run: |
          docker run -d --name fraud-api -p 8000:8000 fraud-detection-api:${{ github.sha }}
          sleep 10
          curl -f http://localhost:8000/ || (docker logs fraud-api && exit 1)
          docker stop fraud-api
